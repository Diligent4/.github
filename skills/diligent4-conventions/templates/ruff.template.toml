# Diligent4 canonical Ruff config.
# Drop into repo root, OR copy the [tool.ruff*] sections into pyproject.toml.

target-version = "py313"
line-length = 100
src = ["src", "tests"]

[lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "UP",  # pyupgrade
    "SIM", # flake8-simplify
    "RUF", # ruff-specific
    "N",   # pep8-naming
    "PL",  # pylint
    "TID", # flake8-tidy-imports (boundary rules below)
    "TCH", # flake8-type-checking
    "ASYNC", # flake8-async
]
ignore = [
    "PLR0913", # too-many-arguments — pydantic models trigger it
    "PLR2004", # magic-value-comparison — too noisy
]

[lint.per-file-ignores]
# Tests can use assert and have less strict naming
"tests/**/*.py" = ["PLR2004", "S101", "PLR0915"]
# CLI entrypoints can have side effects at module level
"src/**/cli.py" = ["PLR0915"]

[lint.flake8-tidy-imports.banned-api]
# Boundary rule 1: LLM access through flingoos_shared_models only.
"openai".msg = "LLM access must go through flingoos_shared_models. See AGENTS.md boundary rules."
"anthropic".msg = "LLM access must go through flingoos_shared_models."
"google.genai".msg = "LLM access must go through flingoos_shared_models."
"google.generativeai".msg = "LLM access must go through flingoos_shared_models."
"langchain".msg = "LLM access must go through flingoos_shared_models."
"langchain_openai".msg = "LLM access must go through flingoos_shared_models."
"langchain_anthropic".msg = "LLM access must go through flingoos_shared_models."

# Boundary rule 3: storage access through flingoos_shared_models only.
"google.cloud.storage".msg = "Storage access must go through flingoos_shared_models. See AGENTS.md."
"google.cloud.firestore".msg = "Storage access must go through flingoos_shared_models."
"firebase_admin.firestore".msg = "Storage access must go through flingoos_shared_models."

[format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"
docstring-code-format = true
docstring-code-line-length = 80

[lint.isort]
known-first-party = ["flingoos_shared_models"]
combine-as-imports = true
split-on-trailing-comma = true

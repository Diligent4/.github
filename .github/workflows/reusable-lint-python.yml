# Reusable Python lint + typecheck + test workflow.
# Consumed by every Python repo in Diligent4.
#
# Caller example:
#   jobs:
#     ci:
#       uses: Diligent4/.github/.github/workflows/reusable-lint-python.yml@main
#       with:
#         needs-ar-auth: true
#       secrets: inherit

name: Reusable Python Lint

on:
  workflow_call:
    inputs:
      working-directory:
        description: 'Directory containing pyproject.toml (relative to repo root)'
        required: false
        type: string
        default: '.'
      python-version:
        description: 'Python version'
        required: false
        type: string
        default: '3.13'
      needs-ar-auth:
        description: 'Authenticate to Google Artifact Registry for flingoos-shared-models'
        required: false
        type: boolean
        default: false
      project-id:
        description: 'GCP project for AR auth (only used when needs-ar-auth=true)'
        required: false
        type: string
        default: 'flingoos-production'
      project-number:
        description: 'GCP project number for WIF (only used when needs-ar-auth=true)'
        required: false
        type: string
        default: '407742180982'
      run-ruff-lint:
        description: 'Run ruff check'
        required: false
        type: boolean
        default: true
      run-ruff-format:
        description: 'Run ruff format --check'
        required: false
        type: boolean
        default: true
      run-typecheck:
        description: 'Run basedpyright'
        required: false
        type: boolean
        default: true
      run-tests:
        description: 'Run pytest'
        required: false
        type: boolean
        default: true
      test-command:
        description: 'Test command override'
        required: false
        type: string
        default: 'uv run pytest'
      uv-sync-args:
        description: 'Extra args passed to `uv sync` (e.g. --all-extras)'
        required: false
        type: string
        default: '--frozen --all-extras'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  id-token: write

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install uv
        # v8 dropped major/minor tags for supply-chain hardening — must SHA-pin.
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: ${{ inputs.python-version }}
          enable-cache: true
          cache-dependency-glob: ${{ inputs.working-directory }}/uv.lock

      - name: Auth to Google Cloud
        if: inputs.needs-ar-auth
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: projects/${{ inputs.project-number }}/locations/global/workloadIdentityPools/github-actions/providers/github
          service_account: github-actions-deployer@${{ inputs.project-id }}.iam.gserviceaccount.com

      - name: Setup gcloud
        if: inputs.needs-ar-auth
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1

      - name: Configure uv for Google Artifact Registry
        if: inputs.needs-ar-auth
        run: |
          # uv reads UV_INDEX_<NAME>_USERNAME / UV_INDEX_<NAME>_PASSWORD for the
          # named index in pyproject.toml. The shared-package install path uses
          # an OAuth2 access token from gcloud — short-lived, no JSON keys.
          TOKEN="$(gcloud auth print-access-token)"
          echo "::add-mask::$TOKEN"
          echo "UV_INDEX_FLINGOOS_USERNAME=oauth2accesstoken" >> "$GITHUB_ENV"
          echo "UV_INDEX_FLINGOOS_PASSWORD=$TOKEN" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: uv sync ${{ inputs.uv-sync-args }}

      - name: Ruff check
        if: inputs.run-ruff-lint
        run: uv run ruff check .

      - name: Ruff format check
        if: inputs.run-ruff-format
        run: uv run ruff format --check .

      - name: basedpyright
        if: inputs.run-typecheck
        run: uv run basedpyright

      - name: Pytest
        if: inputs.run-tests
        run: ${{ inputs.test-command }}

      - name: Summary
        if: always()
        run: |
          {
            echo "## Python CI"
            echo "| Check | Ran |"
            echo "|---|---|"
            echo "| ruff check | ${{ inputs.run-ruff-lint }} |"
            echo "| ruff format --check | ${{ inputs.run-ruff-format }} |"
            echo "| basedpyright | ${{ inputs.run-typecheck }} |"
            echo "| pytest | ${{ inputs.run-tests }} |"
            echo "| AR auth | ${{ inputs.needs-ar-auth }} |"
            echo "| Working dir | \`${{ inputs.working-directory }}\` |"
            echo "| Python | \`${{ inputs.python-version }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"
